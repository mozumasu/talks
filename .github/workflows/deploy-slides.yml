name: Deploy slides to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-slides
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_dispatch を main 以外の ref で実行してもデプロイさせない
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # slides/package.json がテーマ/アドオンを
      # link:../../CHANGE_ME/... で参照しているため、隣に checkout する。
      # テーマリポジトリが private の場合は contents:read の fine-grained PAT が必要
      - name: Checkout deck
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: deck
          persist-credentials: false

      - name: Checkout theme repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mozumasu/CHANGE_ME
          # 再現性のため theme のコミットを固定する。更新時はここを上げる
          ref: main
          path: CHANGE_ME
          token: ${{ secrets.THEME_REPO_READ_TOKEN }}
          persist-credentials: false

      # バージョンは slides/package.json の packageManager フィールドから読む
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: deck/slides/package.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            deck/slides/pnpm-lock.yaml
            CHANGE_ME/pnpm-lock.yaml

      - name: Install theme dependencies
        working-directory: CHANGE_ME
        run: pnpm install --frozen-lockfile

      - name: Install slides dependencies
        working-directory: deck/slides
        run: pnpm install --frozen-lockfile

      # *.workers.dev のルート配信のため --base 指定は不要
      - name: Build slides
        working-directory: deck/slides
        run: pnpm build

      # Slidev が生成する Netlify 用 _redirects (/* /index.html 200) を
      # Cloudflare は不正なルールとして拒否する。SPA fallback は
      # wrangler.jsonc の not_found_handling が担うため削除してよい
      - name: Remove Netlify redirects file
        working-directory: deck/slides
        run: rm -f dist/_redirects

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deck/slides
